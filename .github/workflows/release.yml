name: Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '.config/dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Verify release version
        shell: pwsh
        run: |
          [xml] $props = Get-Content -LiteralPath Directory.Build.props -Raw
          $version = [string] $props.Project.PropertyGroup.Version
          $expectedTag = "v$version"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag '$env:GITHUB_REF_NAME' does not match Directory.Build.props version '$version'. Expected '$expectedTag'."
          }

          $isPrerelease = $version.Contains('-')
          "RELEASE_IS_PRERELEASE=$($isPrerelease.ToString().ToLowerInvariant())" |
            Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify CI passed
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runs = @(
            gh run list `
              --repo $env:GITHUB_REPOSITORY `
              --workflow CI `
              --commit $env:GITHUB_SHA `
              --event push `
              --limit 1 `
              --json status,conclusion | ConvertFrom-Json
          )
          if ($runs.Count -ne 1 -or
              $runs[0].status -ne 'completed' -or
              $runs[0].conclusion -ne 'success') {
            throw "The tagged commit must have a successful CI run before it can be released."
          }

      - name: Build Velopack packages
        shell: pwsh
        run: |
          $repositoryUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY"
          .\tools\Publish-Release.ps1 -RepositoryUrl $repositoryUrl -SkipTests

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseDirectory = 'artifacts\velopack\releases'
          $assets = @(Get-ChildItem -LiteralPath $releaseDirectory -File | ForEach-Object FullName)
          if ($assets.Count -eq 0) {
            throw "No release assets were produced in '$releaseDirectory'."
          }

          $releaseNotesPath = ".github\release-notes\$env:GITHUB_REF_NAME.md"
          $releaseNotesArguments = if (Test-Path -LiteralPath $releaseNotesPath -PathType Leaf) {
            @('--notes-file', $releaseNotesPath)
          } else {
            @('--generate-notes')
          }
          $prereleaseArguments = if ($env:RELEASE_IS_PRERELEASE -eq 'true') {
            @('--prerelease')
          } else {
            @()
          }

          gh release create $env:GITHUB_REF_NAME @assets `
            --verify-tag `
            @prereleaseArguments `
            @releaseNotesArguments `
            --title "UsageDeck $($env:GITHUB_REF_NAME.TrimStart('v'))"
