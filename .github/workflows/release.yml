name: Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '.config/dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Verify release version
        shell: pwsh
        run: |
          [xml] $props = Get-Content -LiteralPath Directory.Build.props -Raw
          $version = [string] $props.Project.PropertyGroup.Version
          $expectedTag = "v$version"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag '$env:GITHUB_REF_NAME' does not match Directory.Build.props version '$version'. Expected '$expectedTag'."
          }

          $isPrerelease = $version.Contains('-')
          "RELEASE_IS_PRERELEASE=$($isPrerelease.ToString().ToLowerInvariant())" |
            Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Test and build Velopack packages
        shell: pwsh
        run: |
          $repositoryUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY"
          .\tools\Publish-Release.ps1 -RepositoryUrl $repositoryUrl

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseDirectory = 'artifacts\velopack\releases'
          $assets = @(Get-ChildItem -LiteralPath $releaseDirectory -File | ForEach-Object FullName)
          if ($assets.Count -eq 0) {
            throw "No release assets were produced in '$releaseDirectory'."
          }

          $releaseNotesPath = ".github\release-notes\$env:GITHUB_REF_NAME.md"
          $releaseTitle = "UsageDeck $($env:GITHUB_REF_NAME.TrimStart('v'))"
          $hasReleaseNotes = Test-Path -LiteralPath $releaseNotesPath -PathType Leaf
          $isPrerelease = $env:RELEASE_IS_PRERELEASE -eq 'true'

          if ($hasReleaseNotes -and $isPrerelease) {
            gh release create $env:GITHUB_REF_NAME --verify-tag --prerelease `
              --notes-file $releaseNotesPath --title $releaseTitle @assets
          } elseif ($hasReleaseNotes) {
            gh release create $env:GITHUB_REF_NAME --verify-tag `
              --notes-file $releaseNotesPath --title $releaseTitle @assets
          } elseif ($isPrerelease) {
            gh release create $env:GITHUB_REF_NAME --verify-tag --prerelease `
              --generate-notes --title $releaseTitle @assets
          } else {
            gh release create $env:GITHUB_REF_NAME --verify-tag `
              --generate-notes --title $releaseTitle @assets
          }
